name: NestJS CI/CD

on:
  # Run CI on PRs to develop or main
  pull_request:
    branches: [develop, main]

  # Run CD on pushes to develop or main
  push:
    branches: [develop, main]

jobs:

  # 1️⃣ CI: Build only
  ci:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.1

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

  # 2️⃣ CD: Deploy after merge
  cd:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_STAGING_SERVICE_ID: ${{ secrets.RENDER_STAGING_SERVICE_ID }}
          RENDER_PRODUCTION_SERVICE_ID: ${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}
        run: |
          if [ "${GITHUB_REF}" == "refs/heads/develop" ]; then
            echo "Deploying to Render STAGING service..."
            curl -X POST "https://api.render.com/v1/services/${RENDER_STAGING_SERVICE_ID}/deploys" \
              -H "Authorization: Bearer $RENDER_API_KEY"
          elif [ "${GITHUB_REF}" == "refs/heads/main" ]; then
            echo "Deploying to Render PRODUCTION service..."
            curl -X POST "https://api.render.com/v1/services/${RENDER_PRODUCTION_SERVICE_ID}/deploys" \
              -H "Authorization: Bearer $RENDER_API_KEY"